<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CDI Strategic Suite</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=PT+Sans+Narrow:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a14;
    --cdi: #5158ff;
    --cdi-light: #7b80ff;
    --text: #c8c8d4;
    --text-dim: #888899;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    font-family: 'IBM Plex Sans', sans-serif;
  }

  /* === TOGGLE BAR === */
  .toggle-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 10000;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 56px;
    background: rgba(10, 10, 20, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(81, 88, 255, 0.15);
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .toggle-bar.hidden {
    transform: translateY(-100%);
  }

  .toggle-brand {
    position: absolute;
    left: 24px;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'PT Sans Narrow', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--cdi);
    opacity: 0.7;
  }

  /* The pill toggle */
  .toggle-pill {
    display: flex;
    align-items: center;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 28px;
    padding: 4px;
    position: relative;
    gap: 0;
  }

  .toggle-option {
    position: relative;
    z-index: 2;
    padding: 8px 20px;
    border-radius: 24px;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    cursor: pointer;
    transition: color 0.35s ease;
    user-select: none;
    white-space: nowrap;
  }

  .toggle-option.active {
    color: white;
  }

  .toggle-option:hover:not(.active) {
    color: var(--text);
  }

  .toggle-slider {
    position: absolute;
    top: 4px;
    left: 4px;
    height: calc(100% - 8px);
    border-radius: 24px;
    background: var(--cdi);
    box-shadow: 0 2px 12px rgba(81, 88, 255, 0.4);
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 1;
  }

  /* Keyboard shortcut hint */
  .toggle-hint {
    position: absolute;
    right: 24px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 11px;
    color: var(--text-dim);
    opacity: 0.5;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .toggle-hint kbd {
    display: inline-block;
    padding: 2px 6px;
    border-radius: 4px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 10px;
    color: var(--text-dim);
  }

  /* === IFRAME CONTAINER === */
  .frame-container {
    position: fixed;
    top: 56px;
    left: 0;
    right: 0;
    bottom: 0;
  }

  .frame-container iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
    transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .frame-container iframe.hidden-frame {
    opacity: 0;
    pointer-events: none;
  }

  .frame-container iframe.active-frame {
    opacity: 1;
    pointer-events: auto;
  }

  /* === LOADING STATE === */
  .loading-overlay {
    position: fixed;
    top: 56px;
    left: 0;
    right: 0;
    bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    z-index: 5000;
    transition: opacity 0.6s ease;
  }

  .loading-overlay.done {
    opacity: 0;
    pointer-events: none;
  }

  .loading-spinner {
    width: 40px;
    height: 40px;
    border: 3px solid rgba(81, 88, 255, 0.15);
    border-top-color: var(--cdi);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* === RESPONSIVE === */
  @media (max-width: 768px) {
    .toggle-brand, .toggle-hint { display: none; }
    .toggle-option {
      padding: 7px 12px;
      font-size: 11px;
    }
    .toggle-bar { height: 48px; }
    .frame-container { top: 48px; }
  }

  /* === TRANSITION FLASH (on switch) === */
  .switch-flash {
    position: fixed;
    top: 56px;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--cdi), transparent);
    z-index: 9999;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .switch-flash.active {
    opacity: 1;
    animation: flash-sweep 0.6s ease-out forwards;
  }
  @keyframes flash-sweep {
    0% { opacity: 1; transform: scaleX(0.3); }
    50% { opacity: 1; transform: scaleX(1); }
    100% { opacity: 0; transform: scaleX(1); }
  }
</style>
</head>
<body>

<!-- Toggle Bar -->
<div class="toggle-bar" id="toggleBar">
  <span class="toggle-brand">CDI</span>

  <div class="toggle-pill" id="togglePill">
    <div class="toggle-slider" id="toggleSlider"></div>
    <div class="toggle-option active" data-view="framework" id="optFramework">
      <span class="opt-icon">◉</span> Living Framework
    </div>
    <div class="toggle-option" data-view="roadmap" id="optRoadmap">
      <span class="opt-icon">◈</span> Product Strategy
    </div>
    <div class="toggle-option" data-view="appendix" id="optAppendix">
      <span class="opt-icon">◊</span> Warm Data
    </div>
  </div>

  <div class="toggle-hint">
    <kbd>Tab</kbd> to switch
  </div>
</div>

<!-- Transition flash -->
<div class="switch-flash" id="switchFlash"></div>

<!-- Loading overlay -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
</div>

<!-- Iframe container -->
<div class="frame-container" id="frameContainer">
  <iframe
    id="frameFramework"
    src="CDI_Narrative_Experience.html"
    class="active-frame"
    title="A Living Framework"
  ></iframe>
  <iframe
    id="frameRoadmap"
    src="CDI_Product_Strategy_Roadmap.html"
    class="hidden-frame"
    title="Product Strategy & Roadmap"
  ></iframe>
  <iframe
    id="frameAppendix"
    src="CDI_Warm_Data_Appendix.html"
    class="hidden-frame"
    title="Warm Data Appendix"
  ></iframe>
</div>

<script>
(function() {
  // State
  const views = ['framework', 'roadmap', 'appendix'];
  let currentView = 'framework';
  let loadCount = 0;
  const totalFrames = 3;

  // Elements
  const options = {
    framework: document.getElementById('optFramework'),
    roadmap:   document.getElementById('optRoadmap'),
    appendix:  document.getElementById('optAppendix'),
  };
  const frames = {
    framework: document.getElementById('frameFramework'),
    roadmap:   document.getElementById('frameRoadmap'),
    appendix:  document.getElementById('frameAppendix'),
  };
  const slider  = document.getElementById('toggleSlider');
  const flash   = document.getElementById('switchFlash');
  const loading = document.getElementById('loadingOverlay');
  const pill    = document.getElementById('togglePill');

  const titles = {
    framework: 'A Living Framework — CDI Strategic Suite',
    roadmap:   'Product Strategy — CDI Strategic Suite',
    appendix:  'Warm Data Appendix — CDI Strategic Suite',
  };

  // Position slider over the active option
  function positionSlider() {
    const active = options[currentView];
    const pillRect = pill.getBoundingClientRect();
    const activeRect = active.getBoundingClientRect();
    slider.style.width = activeRect.width + 'px';
    slider.style.transform = 'translateX(' + (activeRect.left - pillRect.left - 4) + 'px)';
  }

  // Switch view
  function switchTo(view) {
    if (view === currentView) return;
    currentView = view;

    // Update options
    views.forEach(v => {
      options[v].classList.toggle('active', v === view);
    });

    // Move slider
    positionSlider();

    // Flash effect
    flash.classList.remove('active');
    void flash.offsetWidth;
    flash.classList.add('active');

    // Crossfade iframes
    views.forEach(v => {
      if (v === view) {
        frames[v].classList.replace('hidden-frame', 'active-frame');
      } else {
        frames[v].classList.replace('active-frame', 'hidden-frame');
      }
    });

    // Update page title
    document.title = titles[view] || 'CDI Strategic Suite';
  }

  // Click handlers
  views.forEach(v => {
    options[v].addEventListener('click', () => switchTo(v));
  });

  // Keyboard: Tab to cycle through views
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Tab' && !e.ctrlKey && !e.metaKey && !e.altKey) {
      if (document.activeElement && document.activeElement.tagName !== 'IFRAME') {
        e.preventDefault();
        const idx = views.indexOf(currentView);
        const next = views[(idx + 1) % views.length];
        switchTo(next);
      }
    }
  });

  // Loading complete when all iframes are ready
  function onFrameLoad() {
    loadCount++;
    if (loadCount >= totalFrames) loading.classList.add('done');
  }

  frames.framework.addEventListener('load', onFrameLoad);
  frames.roadmap.addEventListener('load', onFrameLoad);
  frames.appendix.addEventListener('load', onFrameLoad);

  // Fallback: dismiss loading after 5s
  setTimeout(() => loading.classList.add('done'), 5000);

  // Initial slider position (after fonts load)
  window.addEventListener('load', positionSlider);
  window.addEventListener('resize', positionSlider);

  requestAnimationFrame(() => {
    requestAnimationFrame(positionSlider);
  });
})();
</script>
</body>
</html>
